services:
  redis:
    image: redis:latest
    restart: always
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data

  mysql:
    image: mysql:latest
    restart: always
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: bigdj_customer
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
#      - ./data/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  consul:
    image: consul:1.14.8
    container_name: consul
    command: agent -dev -client=0.0.0.0
    ports:
      - "8500:8500"
#    volumes:
#      - ./consul-data:/consul/data
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one
    container_name: jaeger
    restart: always
    ports:
      - 6831:6831/udp
      - 6832:6832/udp
      - 5778:5778
      - 16686:16686
      - 4317:4317
      - 4318:4318
      - 14250:14250
      - 14268:14268
      - 14269:14269
      - 9411:9411
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENABLED=true