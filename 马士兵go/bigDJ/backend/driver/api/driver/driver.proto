syntax = "proto3";

package api.driver;
import "google/api/annotations.proto";

option go_package = "driver/api/driver;driver";

service Driver {
  // 提交电话号码
  rpc  IDNoCheck (IDNoCheckReq) returns (IDNoCheckResp) {
    option (google.api.http) = {
      post: "/driver/idno-check",
      body: "*",
    };
  }

  // 获取验证码
	rpc GetVerifyCode (GetVerifyCodeReq) returns (GetVerifyCodeResp) {
    option (google.api.http) = {
      get: "/driver/get-verify-code/{telephone}"
    };
  }

  // 提交电话号码
  rpc  SubmitPhone (SubmitPhoneReq) returns (SubmitPhoneResp) {
    option (google.api.http) = {
      post: "/driver/submit-phone",
      body: "*",
    };
  }

  rpc Login (LoginReq) returns (LoginResp) {
    option (google.api.http) = {
      post: "/driver/login",
      body: "*",
    };
  }
  rpc Logout (LogoutReq) returns (LogoutResp) {
    option (google.api.http) = {
      get: "/driver/logout"
    };
  }
}

message IDNoCheckReq{
  string name = 1;
  string idno = 2;
}

message IDNoCheckResp{
  int64 code = 1;
  string message = 2;
  string status = 3;
}

message GetVerifyCodeReq {
  string telephone = 1;
}
message GetVerifyCodeResp {
  int64 code = 1;
  string message = 2;
  string verify_code = 3;
  int64 verify_code_time = 4;
  int64 verify_code_life = 5;
}

// 提交电话号码请求消息
message SubmitPhoneReq {
  string telephone = 1;
};
message SubmitPhoneResp {
  int64 code = 1;
  string message = 2;
  string status = 3;
};

message LoginReq {
  string telephone = 1;
  string verify_code = 2;
}

message LoginResp {
  int64 code = 1;
  string message = 2;
  string token = 3;
  int64 token_created_at = 4;
  int32 token_life = 5;
}

message LogoutReq {}

message LogoutResp {
  int64 code = 1;
  string message = 2;
}

